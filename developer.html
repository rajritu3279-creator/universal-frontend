<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Universal BaaS - Developer Console</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { margin: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #0f172a; color: white; }
        
        /* Navbar */
        .navbar { background: #1e293b; padding: 15px 30px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #334155; }
        .navbar h2 { margin: 0; color: #3b82f6; font-size: 20px; }
        .logout-btn { background: #ef4444; color: white; border: none; padding: 8px 15px; border-radius: 5px; cursor: pointer; display: none; }

        /* 1. Auth Section (लॉगिन/रजिस्टर) */
        #auth-section { display: flex; justify-content: center; align-items: center; height: 80vh; }
        .auth-box { background: #1e293b; padding: 40px; border-radius: 10px; width: 350px; text-align: center; border: 1px solid #334155; box-shadow: 0 10px 25px rgba(0,0,0,0.5); }
        .auth-box input { width: 90%; padding: 12px; margin: 10px 0; border-radius: 5px; border: 1px solid #475569; background: #0f172a; color: white; outline: none; }
        .btn-primary { background: #3b82f6; color: white; padding: 12px; width: 100%; border: none; border-radius: 5px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .btn-secondary { background: transparent; color: #94a3b8; border: 1px solid #475569; padding: 12px; width: 100%; border-radius: 5px; cursor: pointer; margin-top: 10px; }

        /* 2. Dashboard Section (लॉगिन के बाद) */
        #dashboard-section { display: none; max-width: 1000px; margin: 40px auto; padding: 20px; }
        .welcome-text { font-size: 24px; margin-bottom: 30px; color: #f8fafc; }
        .project-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #334155; padding-bottom: 15px; margin-bottom: 20px; }
        
        .project-card { background: #1e293b; padding: 20px; border-radius: 10px; border: 1px solid #334155; margin-bottom: 15px; display: flex; justify-content: space-between; align-items: center; }
        .project-name { font-size: 20px; font-weight: bold; color: #10b981; margin: 0; }
        .api-key-box { background: #0f172a; padding: 10px; border-radius: 5px; font-family: monospace; color: #f59e0b; margin-top: 10px; border: 1px solid #475569; display: inline-block; }
    </style>
</head>
<body>

    <div class="navbar">
        <h2><i class="fa-solid fa-cloud"></i> Universal BaaS Console</h2>
        <button id="logout-btn" class="logout-btn" onclick="logout()"><i class="fa-solid fa-right-from-bracket"></i> Logout</button>
    </div>

    <div id="auth-section">
        <div class="auth-box">
            <h2>Welcome Developer</h2>
            <p style="color: #94a3b8; font-size: 14px;">Log in to manage your BaaS projects.</p>
            
            <input type="text" id="dev-name" placeholder="Full Name (Only for Sign Up)">
            <input type="email" id="dev-email" placeholder="Developer Email">
            <input type="password" id="dev-pass" placeholder="Password">
            
            <button class="btn-primary" onclick="login()"><i class="fa-solid fa-right-to-bracket"></i> Login</button>
            <button class="btn-secondary" onclick="register()">Create New Account</button>
            <p id="auth-msg" style="color: #ef4444; font-size: 14px; margin-top: 15px;"></p>
        </div>
    </div>

    <div id="dashboard-section">
        <div class="welcome-text">👋 Hello, <span id="display-name" style="color: #3b82f6;">Developer</span>!</div>
        
        <div class="project-header">
            <h3>Your Projects</h3>
            <button style="background: #10b981; color: black; border: none; padding: 10px 20px; border-radius: 5px; font-weight: bold; cursor: pointer;" onclick="createNewProject()">+ New Project</button>
        </div>

        <div id="my-projects-list">
            <p style="color: #94a3b8;">Loading your projects...</p>
        </div>
    </div>

    <script>
        const BASE_URL = 'https://universal-backend-3.onrender.com/api';
        let currentDeveloperId = null;

        // 1. REGISTER (नया अकाउंट)
        async function register() {
            const name = document.getElementById('dev-name').value;
            const email = document.getElementById('dev-email').value;
            const pass = document.getElementById('dev-pass').value;
            const msg = document.getElementById('auth-msg');

            if(!name || !email || !pass) return msg.innerText = "नाम, ईमेल और पासवर्ड तीनों ज़रूरी हैं!";
            msg.innerText = "Creating account... ⏳";

            try {
                const res = await fetch(`${BASE_URL}/dev-auth/register`, {
                    method: 'POST', headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name, email, password: pass })
                });
                const data = await res.json();
                
                if(res.ok) {
                    successLogin(data.developerId, data.name);
                } else {
                    msg.innerText = "❌ " + data.message;
                }
            } catch(e) { msg.innerText = "❌ Server Connection Error!"; }
        }

        // 2. LOGIN (पुराना अकाउंट)
        async function login() {
            const email = document.getElementById('dev-email').value;
            const pass = document.getElementById('dev-pass').value;
            const msg = document.getElementById('auth-msg');

            if(!email || !pass) return msg.innerText = "ईमेल और पासवर्ड डालें!";
            msg.innerText = "Logging in... ⏳";

            try {
                const res = await fetch(`${BASE_URL}/dev-auth/login`, {
                    method: 'POST', headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password: pass })
                });
                const data = await res.json();
                
                if(res.ok) {
                    successLogin(data.developerId, data.name);
                } else {
                    msg.innerText = "❌ " + data.message;
                }
            } catch(e) { msg.innerText = "❌ Server Connection Error!"; }
        }

        // 3. SUCCESS LOGIN & LOAD DASHBOARD
        function successLogin(devId, devName) {
            currentDeveloperId = devId; // ID सेव कर ली
            document.getElementById('auth-section').style.display = 'none';
            document.getElementById('dashboard-section').style.display = 'block';
            document.getElementById('logout-btn').style.display = 'block';
            document.getElementById('display-name').innerText = devName;
            
            loadMyProjects(); // सिर्फ इस डेवलपर के प्रोजेक्ट मंगाओ
        }

        // 4. LOAD PROJECTS (सिर्फ खुद के)
        async function loadMyProjects() {
            const list = document.getElementById('my-projects-list');
            list.innerHTML = '<p style="color: #10b981;">Fetching your data... ⏳</p>';
            
            try {
                // यहाँ हम URL में ownerId (developerId) भेज रहे हैं!
                const res = await fetch(`${BASE_URL}/baas-apps/developer/${currentDeveloperId}`);
                const apps = await res.json();

                list.innerHTML = '';
                if(apps.length === 0) {
                    list.innerHTML = '<div style="text-align: center; padding: 40px; background: #1e293b; border-radius: 10px; color: #94a3b8;">You don\'t have any projects yet. Click "+ New Project" to start!</div>';
                    return;
                }

                apps.forEach(app => {
                    list.innerHTML += `
                    <div class="project-card">
                        <div>
                            <h3 class="project-name">${app.name}</h3>
                            <div class="api-key-box">Key: ${app.apiKey}</div>
                        </div>
                        <button onclick="navigator.clipboard.writeText('${app.apiKey}'); alert('Key Copied!');" style="background: #3b82f6; border: none; color: white; padding: 10px; border-radius: 5px; cursor: pointer;"><i class="fa-solid fa-copy"></i> Copy</button>
                    </div>`;
                });
            } catch(e) { list.innerHTML = '<p style="color: #ef4444;">Failed to load projects.</p>'; }
        }

        // 5. CREATE NEW PROJECT
        async function createNewProject() {
            const projName = prompt("Enter new project name (e.g., My Ludo Game):");
            if(!projName) return;

            try {
                // प्रोजेक्ट बनाते समय हम बता रहे हैं कि इसका मालिक कौन है (ownerId)
                const res = await fetch(`${BASE_URL}/baas-apps`, {
                    method: 'POST', headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name: projName, ownerId: currentDeveloperId })
                });
                
                if(res.ok) {
                    alert("🎉 Project created successfully!");
                    loadMyProjects(); // लिस्ट रिफ्रेश करो
                } else {
                    alert("Failed to create project.");
                }
            } catch(e) { alert("Server Error."); }
        }

        // 6. LOGOUT
        function logout() {
            currentDeveloperId = null;
            document.getElementById('auth-section').style.display = 'flex';
            document.getElementById('dashboard-section').style.display = 'none';
            document.getElementById('logout-btn').style.display = 'none';
            document.getElementById('dev-pass').value = '';
        }
    </script>
</body>
</html>
